<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting to Pioniar...</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20%; background-color: #f1f5f9; color: #334155; }
        .loader { border: 4px solid #cbd5e1; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Menghubungkan ke Pioniar Network...</h2>
    <div class="loader"></div>
    <script type="text/javascript">
        setTimeout(function() {
            var error = "$(error)";
            var loginUrl = "$(link-login-only)"; // Menangkap alamat asli Hotspot (misal http://pioniar.wifi/login)
            
            var redirectUrl = "https://pioniar.web.app/portal";
            var params = [];
            
            if (loginUrl && loginUrl.indexOf("$") === -1) {
                params.push("loginUrl=" + encodeURIComponent(loginUrl));
            }
            
            if (error && error.indexOf("$") === -1 && error.length > 0) {
                params.push("error=" + encodeURIComponent(error));
            }
            
            if (params.length > 0) {
                redirectUrl += "?" + params.join("&");
            }
            
            window.location.href = redirectUrl;
        }, 300);
    </script>
</body>
</html>
